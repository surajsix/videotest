<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Text Translator</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  </head>
  <body>
    <main class="container">
      <h1>Image Text Translator (v2)</h1>
      <p class="subtitle">
        Upload an image, extract text, translate it to your language, then download either the translated text or a translated image.
      </p>

      <section class="card">
        <label for="imageInput">1) Upload image</label>
        <input id="imageInput" type="file" accept="image/*" />
        <img id="preview" alt="Uploaded preview" hidden />

        <div class="language-row">
          <div>
            <label for="ocrLanguage">OCR language</label>
            <select id="ocrLanguage">
              <option value="eng">English</option>
              <option value="spa">Spanish</option>
              <option value="fra">French</option>
              <option value="deu">German</option>
              <option value="ita">Italian</option>
              <option value="por">Portuguese</option>
            </select>
          </div>

          <div>
            <label for="targetLanguage">Translate to</label>
            <select id="targetLanguage">
              <option value="en">English</option>
              <option value="es">Spanish</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="it">Italian</option>
              <option value="pt">Portuguese</option>
              <option value="hi">Hindi</option>
              <option value="ar">Arabic</option>
              <option value="ja">Japanese</option>
              <option value="ko">Korean</option>
              <option value="zh-cn">Chinese (Simplified)</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button id="runBtn">2) Extract & Translate</button>
          <button id="translateEditedBtn" class="secondary" disabled>Re-translate edited text</button>
        </div>
        <p id="status" class="status"></p>
      </section>

      <section class="card output-grid">
        <div>
          <h2>Extracted text</h2>
          <textarea id="extractedText" placeholder="OCR text will appear here. You can edit it and re-translate."></textarea>
        </div>
        <div>
          <h2>Translated text</h2>
          <textarea id="translatedText" readonly placeholder="Translated text will appear here..."></textarea>
        </div>
      </section>

      <section class="card">
        <h2>Translated image preview</h2>
        <p class="small-note">A generated image with your original upload and translated text block.</p>
        <canvas id="translatedCanvas" width="1200" height="800"></canvas>
      </section>

      <div class="button-row">
        <button id="downloadTextBtn" disabled>Download translation (.txt)</button>
        <button id="downloadImageBtn" disabled>Download translated image (.png)</button>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
